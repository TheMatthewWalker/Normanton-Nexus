<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Normanton Nexus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="icon" href="/images/logo16.png">
</head>
<body>
  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon"><img src="./images/logo32.png" alt="Kongsberg Logo"></div>
        <span class="brand-name">Normanton Nexus</span>
      </div>
      <div class="brand-sub">Enterprise Operations Portal</div>
    </div>

    <div class="card">

      <!-- ── Login panel ─────────────────────────────────────────────────── -->
      <div id="panel-login">
        <div class="card-title">Authentication</div>
        <form method="POST" action="/login">
          <div class="field">
            <label>Username</label>
            <input name="username" placeholder="Enter username" autocomplete="username" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <button class="submit-btn" type="submit">Authenticate</button>
          <div class="error-msg" id="login-error"></div>
        </form>
        <div class="switch-link">No account? <a href="#" id="goto-register">Request access</a></div>
      </div>

      <!-- ── Register panel ─────────────────────────────────────────────── -->
      <div id="panel-register">
        <div class="card-title">Request Access</div>
        <form id="register-form" autocomplete="off">
          <div style="display:flex;gap:10px">
            <div class="field" style="flex:1">
              <label>First Name</label>
              <input id="reg-firstname" name="firstName" placeholder="John" autocomplete="off" required>
            </div>
            <div class="field" style="flex:1">
              <label>Last Name</label>
              <input id="reg-lastname" name="lastName" placeholder="Smith" autocomplete="off" required>
            </div>
          </div>
          <div id="reg-username-preview" style="font-size:11px;color:#6b7f99;margin:-6px 0 10px;min-height:16px"></div>
          <div class="field">
            <label>Email</label>
            <input id="reg-email" name="email" type="email" placeholder="your@email.com" autocomplete="off" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input id="reg-password" name="password" type="password" placeholder="Min 10 chars, 1 uppercase, 1 number" required>
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <input id="reg-confirm" name="confirmPassword" type="password" placeholder="••••••••" required>
          </div>
          <button class="submit-btn" type="submit">Submit Request</button>
          <div class="error-msg" id="register-error"></div>
        </form>
        <div class="switch-link">Already have an account? <a href="#" id="goto-login">Sign in</a></div>
      </div>

    </div>

    <div class="footer-note">Normanton Nexus &nbsp;·&nbsp; Authorised access only &nbsp;·&nbsp; All activity is logged</div>
  </div>

  <script>
    // ── Panel toggle ──────────────────────────────────────────────────────────
    document.getElementById('goto-register').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('panel-login').style.display    = 'none';
      document.getElementById('panel-register').style.display = 'block';
    });

    document.getElementById('goto-login').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('panel-register').style.display = 'none';
      document.getElementById('panel-login').style.display    = 'block';
    });

    // ── URL error param → login error message ─────────────────────────────────
    const errorMessages = {
      invalid_credentials: 'Invalid username or password.',
      pending_approval:    'Your account is pending admin approval.',
      account_locked:      'Account locked after too many failed attempts.',
      too_many_attempts:   'Too many login attempts. Try again in 15 minutes.',
      missing_fields:      'Please enter your username and password.',
      server_error:        'Server error. Please try again.',
    };
    const params = new URLSearchParams(window.location.search);
    const errKey = params.get('error');
    if (errKey) {
      document.getElementById('login-error').textContent = errorMessages[errKey] || 'An error occurred.';
    }

    // ── Username preview ──────────────────────────────────────────────────────
    function toUsernameSlug(s) {
      return s.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    }
    function updatePreview() {
      const fn = toUsernameSlug(document.getElementById('reg-firstname').value);
      const ln = toUsernameSlug(document.getElementById('reg-lastname').value);
      const el = document.getElementById('reg-username-preview');
      el.textContent = fn && ln ? `Username will be: ${fn}.${ln}` : '';
    }
    document.getElementById('reg-firstname').addEventListener('input', updatePreview);
    document.getElementById('reg-lastname').addEventListener('input',  updatePreview);

    // ── Registration form submit ───────────────────────────────────────────────
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('register-error');
      errEl.textContent = '';
      errEl.style.color = '';

      const body = {
        firstName:       document.getElementById('reg-firstname').value,
        lastName:        document.getElementById('reg-lastname').value,
        email:           document.getElementById('reg-email').value,
        password:        document.getElementById('reg-password').value,
        confirmPassword: document.getElementById('reg-confirm').value,
      };

      try {
        const res  = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.success) {
          errEl.style.color   = 'var(--success)';
          errEl.textContent   = data.message;
          document.getElementById('register-form').reset();
        } else {
          errEl.textContent = data.error || 'Registration failed.';
        }
      } catch {
        errEl.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
